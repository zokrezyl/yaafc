/* yaafc-yemu VM config — consumed by tinyemu's temu.c.
 *
 * Paths are MEMFS paths inside the wasm runtime; the JS preamble
 * (index.html) writes the kernel + opensbi + rootfs into these
 * locations before calling main().
 *
 * net=user is slirp's user-mode network (NAT'd inside the VM with
 * the standard 10.0.2.0/24 layout). The forwarded ports inside the
 * VM (8080 = yaafc gateway, 8081 = yaafc-frontend) are reachable from
 * the host via slirp's redirector when running outside the browser;
 * inside the browser the network is contained to the wasm process.
 */
{
    version: 1,
    machine: "riscv64",
    memory_size: 256,
    bios: "/vm/opensbi-fw_jump.elf",
    kernel: "/vm/kernel-riscv64.bin",
    cmdline: "earlycon=sbi console=hvc0 root=/dev/vda rootfstype=ext4 rw init=/opt/git-yaafc/run.sh",
    drive0: { file: "/vm/alpine-rootfs.img" },
    eth0: { driver: "user" },
}
