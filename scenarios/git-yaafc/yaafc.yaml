# git-yaafc — mirror of yaapp's scenarios/git-yaapp/yaapp.yaml.
#
# A "mesh" parent process spawns each backend as a child yaafc serving
# JSON-RPC over yttp on the listed port. Real portalloc integration
# would assign ports dynamically; for today every service has an
# explicit `port:` so the mesh can spawn deterministically.
#
# To bring it up:
#
#   make build-desktop-release
#   ./scenarios/git-yaafc/mesh-up.sh
#
# The script connects to the parent's control yttp, calls
# `mesh_store_reconcile_from_config`, then probes a few children.

name: mesh

# Parent process control port — clients (including the smoke script)
# talk to the mesh here.
control:
  host: 127.0.0.1
  port: 8800

mesh:
  auto_reconcile: true
  services:

    portalloc:
      port: 8201
      plugins: [portalloc]
      config:
        portalloc:
          port_range: "8201-8299"

    storage:
      port: 8202
      plugins: [storage]
      config:
        storage:
          # backend: sqlite (default) | mdbx
          # sqlite uses `db_path`; mdbx uses `mdbx_path` (a directory).
          backend: sqlite
          db_path: /tmp/git-yaafc/central.db
          mdbx_path: /tmp/git-yaafc/mdbx

    session:
      port: 8203
      plugins: [session]
      config:
        remotes:
          - service: storage
            port: 8202
          - service: token_issuer
            port: 8207

    accounts:
      port: 8204
      plugins: [accounts]
      config:
        remotes:
          - service: storage
            port: 8202

    password_authn:
      port: 8205
      plugins: [password_authn]
      config:
        remotes:
          - service: storage
            port: 8202
          - service: accounts
            port: 8204

    github_authn:
      port: 8206
      plugins: [github_authn]
      config:
        remotes:
          - service: storage
            port: 8202

    token_issuer:
      port: 8207
      plugins: [token_issuer]
      config:
        remotes:
          - service: storage
            port: 8202
          - service: accounts
            port: 8204

    issues:
      port: 8208
      plugins: [issues]
      config:
        remotes:
          - service: storage
            port: 8202

    git_repo:
      port: 8209
      plugins: [git_repo]
      config:
        git_repo:
          # Per-user parent dir layout: each repo lives at
          # <repos_dir>/<owner_name>/<repo_name>.git (bare).
          # Defaults to /tmp/git-yaafc/repos if omitted.
          repos_dir: /tmp/git-yaafc/repos
        remotes:
          - service: storage
            port: 8202

    git_pipeline:
      port: 8210
      plugins: [git_pipeline]
      config:
        remotes:
          - service: storage
            port: 8202

    personal_access_tokens:
      port: 8211
      plugins: [personal_access_tokens]
      config:
        remotes:
          - service: storage
            port: 8202

    # The gateway. Per CLAUDE.md: this is the ONE service that
    # listens yhttp — it's the auth boundary. External clients
    # (browser, MCP, CLI, tests) hit it; the gateway translates
    # opaque tokens to internal JWTs and forwards over yrpc.
    #
    # Naming: this service is named `gateway` to mirror yaapp's
    # scenarios/git-yaapp/yaapp.yaml. The word "frontend" used to
    # name this service AND the transport AND a directory — three
    # incompatible meanings; we now reserve "frontend" for the
    # standalone HTML-rendering sidecar (still a separate piece of
    # work — today, the gateway also serves the legacy HTML routes
    # in src/yaafc/frontends/yhttp/frontend.c).
    #
    # The `frontend:` key below is the TRANSPORT selector (yhttp |
    # yrpc | yttp), NOT a service name.
    gateway:
      port: 8080
      # 0.0.0.0 so the gateway is reachable from outside the host the
      # mesh runs on — required for the qemu hostfwd and the wasm/slirp
      # bridge inside the in-browser VM. Backends stay 127.0.0.1 (their
      # default) per the CLAUDE.md invariant: only the gateway is the
      # external auth boundary; everything else is mesh-internal.
      host: 0.0.0.0
      frontend: yhttp
      plugins: []
      config:
        yhttp:
          static_dir: scenarios/git-yaafc/frontend/static
        remotes:
          - service: storage
            port: 8202
          - service: session
            port: 8203
          - service: accounts
            port: 8204
          - service: password_authn
            port: 8205
          - service: github_authn
            port: 8206
          - service: token_issuer
            port: 8207
          - service: issues
            port: 8208
          - service: git_repo
            port: 8209
          - service: git_pipeline
            port: 8210
          - service: personal_access_tokens
            port: 8211
