# picoforge — COLLOCATED all-in-one config for the webasm / in-browser
# deployment.
#
# The server scenario (picoforge.yaml) runs each service as its own process
# and the gateway talks to them over yrpc/TCP. That topology is great on
# real hardware but brutal inside the RISC-V emulator, where a dozen
# processes trading loopback-TCP through the emulated NIC dominates the
# cost.
#
# picomesh was designed so the SAME plugins can be split across processes OR
# folded into one. This config takes the second path: a SINGLE process
# ("app") loads the gateway frontend PLUS every backend service PLUS the
# storage, and they call each other IN-PROCESS — no yrpc, no TCP, no
# extra processes. Launch it directly (no mesh bootstrap):
#
#   picomesh --config-file picoforge-webasm.yaml --name app \
#         --frontend yhttp --host 0.0.0.0 --port 8080 serve
#
# `--name app` projects `mesh.services.app.config` as this process's
# config root. There is NO `remotes:` block, so every `service_ctx()`
# resolves to a local in-process object (rpc_object_acquire's no-peer
# path). All plugin classes are registered process-wide at startup, so a
# single process can host them all.

name: app

mesh:
  services:
    app:
      # The one and only process. 0.0.0.0 so the in-browser slirp bridge
      # (and the qemu hostfwd) can reach it.
      host: 0.0.0.0
      port: 8080
      frontend: yhttp
      # SINGLE worker — the wasm runtime has no pthreads, so extra in-process
      # worker threads can't be spawned. (This is also the default; set
      # explicitly so the webasm deploy never accidentally multi-threads.)
      workers: 1
      # Every service in ONE process. The list is documentation — all
      # plugin classes are linked and registered regardless; what makes
      # them LOCAL is the absence of a `remotes:` block below.
      plugins:
        - portalloc
        - sharded_storage
        - session
        - accounts
        - password_authn
        - github_authn
        - token_issuer
        - issues
        - git_repo
        - git_pipeline
        - personal_access_tokens
        - relational_storage
      config:
        yhttp:
          static_dir: assets/picoforge/static
          # This process IS the web-facing gateway even though `session`
          # has no remote peer (it's local here). Without this flag the
          # frontend would assume it's a headless backend and serve JSON
          # only. See yhttp_frontend_try().
          serve_app: true
        sharded_storage:
          # One shard is plenty for the demo; collocation already removed
          # the per-call process hop, which was the real cost.
          shards: 1
          path: /tmp/picoforge/sharded
        git_repo:
          repos_dir: /tmp/picoforge/repos
          # SINGLE-THREADED runtime: the wasm build has no pthreads, so the
          # git commit executor must not try to spawn worker threads. Default
          # is 8 (→ 8 uv_thread_create calls); pin to 1 so git ops run on the
          # one shard (and exec falls back to inline if even that can't
          # start). Critical for the webasm/node VM where threads are absent.
          commit_shards: 1
        # relational_storage hosts FOUR logical databases in this ONE process —
        # the collocated equivalent of the split mesh's rstore_uid / rstore_username
        # / rstore_session / rstore_token services. Consumers select their
        # database by name (accounts → uid + username, session → session,
        # token_issuer → token); each database shards by its own routing key
        # (uid for the data store, hash(external id) for the lookup stores) with
        # its own shard set. One shard each is plenty for the emulator demo.
        # accounts/session/token_issuer create their own tables at runtime
        # (rel_ensure_schema); the uid database also carries the product tables,
        # applied verbatim on shard open (mirrors picoforge.yaml's rstore_uid).
        relational_storage:
          # EPHEMERAL/in-RAM deploy (the DB tree lives on the tmpfs /tmp and is
          # discarded on reboot), so trade durability for speed: keep the
          # rollback journal in memory and skip every fsync. Under the RISC-V
          # CPU emulation this is the single biggest boot/seed speedup — it kills
          # the -wal/-shm file churn + fsync syscalls that dominated the perf
          # profile. (Flat keys apply to all databases below.) The split mesh
          # leaves these unset → WAL + synchronous=FULL (durable) as before.
          journal_mode: MEMORY
          synchronous: "OFF"
          databases:
            uid:
              shards: 1
              path: /tmp/picoforge/rel/uid
              schema: |
                CREATE TABLE IF NOT EXISTS repos(
                  id INTEGER PRIMARY KEY,
                  namespace_id INTEGER NOT NULL,
                  name TEXT NOT NULL,
                  owner_uid INTEGER NOT NULL,
                  visibility TEXT NOT NULL DEFAULT 'private',
                  created_at INTEGER NOT NULL DEFAULT 0,
                  UNIQUE(namespace_id, name));
                CREATE TABLE IF NOT EXISTS repo_members(
                  repo_id INTEGER NOT NULL,
                  uid INTEGER NOT NULL,
                  role TEXT NOT NULL DEFAULT 'member',
                  PRIMARY KEY(repo_id, uid));
                CREATE TABLE IF NOT EXISTS issues(
                  id INTEGER PRIMARY KEY,
                  repo_id INTEGER NOT NULL,
                  number INTEGER NOT NULL,
                  title TEXT,
                  status TEXT NOT NULL DEFAULT 'open',
                  author_uid INTEGER NOT NULL,
                  created_at INTEGER NOT NULL DEFAULT 0,
                  UNIQUE(repo_id, number));
                CREATE TABLE IF NOT EXISTS pipeline_runs(
                  id INTEGER PRIMARY KEY,
                  repo_id INTEGER NOT NULL,
                  status TEXT NOT NULL DEFAULT 'pending',
                  created_by_uid INTEGER NOT NULL,
                  created_at INTEGER NOT NULL DEFAULT 0);
                CREATE INDEX IF NOT EXISTS ix_repos_owner ON repos(owner_uid);
                CREATE INDEX IF NOT EXISTS ix_issues_repo ON issues(repo_id);
                CREATE INDEX IF NOT EXISTS ix_runs_repo   ON pipeline_runs(repo_id);
                CREATE INDEX IF NOT EXISTS ix_members_uid ON repo_members(uid);
            username:
              shards: 1
              path: /tmp/picoforge/rel/username
            session:
              shards: 1
              path: /tmp/picoforge/rel/session
            token:
              shards: 1
              path: /tmp/picoforge/rel/token
        # NO `remotes:` — every backend is collocated and resolved
        # in-process. This single key is the whole difference between the
        # 12-process mesh and the 1-process all-in-one.
