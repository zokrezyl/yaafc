# picoforge — mirror of yaapp's scenarios/git-yaapp/yaapp.yaml.
#
# A "mesh" parent process spawns each backend as a child picomesh serving
# JSON-RPC over yttp on the listed port. Real portalloc integration
# would assign ports dynamically; for today every service has an
# explicit `port:` so the mesh can spawn deterministically.
#
# To bring it up:
#
#   make build-desktop-release
#   ./tools/picoforge/mesh-up.sh
#
# The script connects to the parent's control yttp, calls
# `mesh_mesh_reconcile_from_config`, then probes a few children.

name: mesh

# Plugins the PARENT (control) process itself activates. Registration is
# activation: only listed plugins enter this process's registry and become
# reachable through its frontend. The parent only needs `mesh` — it serves
# mesh_mesh on the control port (/create + reconcile_from_config) to spawn
# the children. Each child is spawned with `--name <service>` and activates
# its own `mesh.services.<service>.plugins` list. (The driver reads this
# top-level `plugins:` because the parent runs with no `--name`.)
plugins:
  - mesh
  # The parent also activates `storage` for its OWN bookkeeping: mesh_mesh
  # records the pids of the children it spawns (and its own pid) here so it
  # can reap them on shutdown, and so the stack can be stopped by signalling
  # the recorded parent pid — never by pkill. Private parent state, separate
  # from the `sharded_storage` backend the app uses.
  - storage

storage:
  backend: sqlite
  db_path: /tmp/picoforge/mesh-state.db

# Mesh-wide security material (issue #19). The HS256 signing key for access
# JWTs is shared across the trusted mesh: the token issuer signs with it and
# the gateway verifies with it. It is REQUIRED — sourced from the environment,
# never a baked-in default (a predictable key would let anyone forge a JWT).
# Children inherit this env from the control parent, so every node resolves the
# same key. The authenticator chain + policy authorizer live ONLY on the
# gateway service (see mesh.services.gateway.config.security below); putting
# them here would turn every node into an auth boundary.
security:
  jwt_secret: "${PICOMESH_JWT_SECRET}"
  access_ttl_seconds: 900

# Parent process control port — clients (including the smoke script)
# talk to the mesh here.
control:
  host: 127.0.0.1
  port: 8800

mesh:
  auto_reconcile: true
  services:

    # The trace collector (issue #11): an ordinary yrpc backend plugin that
    # RECEIVES spans on its exposed `trace_collector_ingest` method and answers
    # the query methods (trace_collector_get_trace / _services / _operations /
    # _latency / _errors). Every other service lists it as a remote
    # and ships finished spans to it over its OWN per-worker connection,
    # fire-and-forget (see ytelemetry). State is an in-memory bounded store —
    # no durable storage in v1. Reached for queries like any backend, through
    # the gateway's /_rpc + /_describe (service-driven, no bespoke routes).
    # Listed first so it binds before the services that emit to it.
    trace_collector:
      port: 8220
      # Multi-worker like the gateway: N threads, each its own loop +
      # coroutine scheduler, all accept()ing on :8220 via SO_REUSEPORT and
      # multiplexing keep-alive connections. The receiver must drain ~5
      # spans per gateway request, so it needs real parallelism — a single
      # worker backpressures the request path (gh#13). The in-memory store
      # is mutex-guarded, so multi-worker is safe (gh#13 tracks sharding the
      # store so it scales past the single lock).
      workers: 16
      plugins: [trace_collector]
      config:
        # In-memory store retention (read by the plugin → ytelemetry_store_init).
        telemetry:
          max_spans: 200000
          max_age_seconds: 3600
        remotes: []

    portalloc:
      port: 8201
      plugins: [portalloc]
      config:
        portalloc:
          port_range: "8201-8299"

    # Storage = write-parallel sharded KV store (N mdbx shard envs keyed
    # by hash(ns·key); one writer + fsync stream per shard). The plain
    # single-env `storage` plugin still exists in the tree but is no
    # longer run as a mesh service — every backend uses this.
    sharded_storage:
      port: 8212
      # gh#6: in-process multithreaded workers. Set `workers: N` to run
      # this service as N worker threads in ONE process — each with its
      # own libuv event loop AND its own libco coroutine scheduler, all
      # accept()ing on the same port via SO_REUSEPORT. The RPC handle
      # table is per-worker (a connection is pinned to one worker for its
      # lifetime); the class registry is shared read-only. Omitted ⇒ 1
      # (single-threaded). Requires libco built with -DLIBCO_MP.
      # The shared source of truth for every backend's state — hit hardest,
      # so it gets the most workers.
      workers: 8
      plugins: [sharded_storage]
      config:
        sharded_storage:
          shards: 8
          path: /tmp/picoforge/sharded
        # sharded_storage calls no backend, but its skels emit server spans,
        # so it still needs a connection to ship them to the collector.
        remotes:
          - service: trace_collector
            port: 8220

    # relational_storage (gh#18): SQLite per namespace-shard for relational
    # PRODUCT state (users, repos, members, issues, pipeline runs) — real SQL
    # constraints/indexes/joins/transactions, sharded by namespace_id % N.
    # The core product services use this; sharded_storage stays for KV-shaped
    # runtime state (sessions, tokens, caches). See docs/relational-storage.md.
    relational_storage:
      port: 8213
      workers: 4
      plugins: [relational_storage]
      config:
        relational_storage:
          shards: 8
          path: /tmp/picoforge/relational
          # The picoforge PRODUCT data model lives HERE, not in the engine.
          # relational_storage is generic: it applies this DDL verbatim to
          # each shard on open. Sharded by namespace (the caller's shard key).
          schema: |
            CREATE TABLE IF NOT EXISTS users(
              uid INTEGER PRIMARY KEY,
              username TEXT UNIQUE NOT NULL,
              display_name TEXT,
              created_at INTEGER NOT NULL DEFAULT 0);
            CREATE TABLE IF NOT EXISTS namespaces(
              id INTEGER PRIMARY KEY,
              kind TEXT NOT NULL DEFAULT 'user',
              name TEXT NOT NULL,
              owner_uid INTEGER NOT NULL,
              created_at INTEGER NOT NULL DEFAULT 0,
              UNIQUE(kind, name));
            CREATE TABLE IF NOT EXISTS repos(
              id INTEGER PRIMARY KEY,
              namespace_id INTEGER NOT NULL,
              name TEXT NOT NULL,
              owner_uid INTEGER NOT NULL,
              visibility TEXT NOT NULL DEFAULT 'private',
              created_at INTEGER NOT NULL DEFAULT 0,
              UNIQUE(namespace_id, name));
            CREATE TABLE IF NOT EXISTS repo_members(
              repo_id INTEGER NOT NULL,
              uid INTEGER NOT NULL,
              role TEXT NOT NULL DEFAULT 'member',
              PRIMARY KEY(repo_id, uid));
            CREATE TABLE IF NOT EXISTS issues(
              id INTEGER PRIMARY KEY,
              repo_id INTEGER NOT NULL,
              number INTEGER NOT NULL,
              title TEXT,
              status TEXT NOT NULL DEFAULT 'open',
              author_uid INTEGER NOT NULL,
              created_at INTEGER NOT NULL DEFAULT 0,
              UNIQUE(repo_id, number));
            CREATE TABLE IF NOT EXISTS pipeline_runs(
              id INTEGER PRIMARY KEY,
              repo_id INTEGER NOT NULL,
              status TEXT NOT NULL DEFAULT 'pending',
              created_by_uid INTEGER NOT NULL,
              created_at INTEGER NOT NULL DEFAULT 0);
            CREATE INDEX IF NOT EXISTS ix_repos_owner ON repos(owner_uid);
            CREATE INDEX IF NOT EXISTS ix_issues_repo ON issues(repo_id);
            CREATE INDEX IF NOT EXISTS ix_runs_repo   ON pipeline_runs(repo_id);
            CREATE INDEX IF NOT EXISTS ix_members_uid ON repo_members(uid);
        remotes:
          - service: trace_collector
            port: 8220

    session:
      port: 8203
      # Hit on EVERY authenticated /_rpc (token→uid). State is in
      # sharded_storage (no in-memory bookkeeping); start mints a random
      # 128-bit token (no shared counter) and lookup is a single read, so
      # there is no read-modify-write to race across workers.
      workers: 8
      plugins: [session]
      config:
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220
          - service: token_issuer
            port: 8207

    accounts:
      port: 8204
      plugins: [accounts]
      config:
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220

    password_authn:
      port: 8205
      plugins: [password_authn]
      config:
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220
          - service: accounts
            port: 8204

    github_authn:
      port: 8206
      plugins: [github_authn]
      config:
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220

    token_issuer:
      port: 8207
      plugins: [token_issuer]
      config:
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220
          - service: accounts
            port: 8204
          # login delegates credential verification to password_authn.
          - service: password_authn
            port: 8205

    issues:
      port: 8208
      plugins: [issues]
      config:
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220

    git_repo:
      port: 8209
      # Metadata is in sharded_storage (the bare repos on disk are the content
      # source of truth). Creation elects one writer via storage put_if_absent
      # and bumps the count / owner index with atomic db_incr + compare-and-set,
      # so concurrent creates can't double-count or lose index entries. Fewer
      # workers than the storage/session tier — repo ops are heavier (libgit2).
      workers: 4
      plugins: [git_repo]
      config:
        git_repo:
          # Per-user parent dir layout: each repo lives at
          # <repos_dir>/<owner_name>/<repo_name>.git (bare).
          # Defaults to /tmp/picoforge/repos if omitted.
          repos_dir: /tmp/picoforge/repos
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220

    git_pipeline:
      port: 8210
      plugins: [git_pipeline]
      config:
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220

    personal_access_tokens:
      port: 8211
      plugins: [personal_access_tokens]
      config:
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220

    # runner_agent (docs/runner-agent.md): the registry of external CI runner
    # agents. Owns runner identity — opaque `rnr_` token mint/lookup/revoke and
    # the runner record (name, labels, version, host, status, last_seen). The
    # gateway's bearer authenticator resolves an `rnr_` token here to a runner
    # id and mints a runner JWT; git_pipeline owns the job state the runner then
    # leases. yrpc backend like the rest — no HTTP, behind the gateway.
    runner_agent:
      port: 8214
      plugins: [runner_agent]
      config:
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220

    # The gateway. Per CLAUDE.md: this is the ONE service that
    # listens yhttp — it's the auth boundary. External clients
    # (browser sidecar, MCP, CLI, tests) hit it; the gateway
    # translates opaque tokens to internal JWTs and forwards over
    # yrpc.
    #
    # Public API (yaapp-compatible, src/picomesh/frontends/yhttp/):
    #   POST /_rpc                {"path":"service.class.method","args":[]}
    #   GET|POST /_describe                       — list backend services
    #   GET|POST /<service.class>/_describe[_tree] — list a class's methods
    # The legacy /create, /invoke and /describe?class= helpers are
    # retired on this port (they answer 410 → use /_rpc). The binary
    # /_rpc?op=&id= form remains internal gateway↔backend transport.
    #
    # FRONTEND DIRECTION (resolved): the browser-facing HTML is the
    # standalone `picoforge-webapp` sidecar (src/picoforge/webapp/), NOT a
    # combined gateway. The sidecar links no plugins and reaches every
    # backend only through this gateway's /_rpc — see mesh-up.sh, which
    # launches it on :8080. The HTML routes still compiled into the
    # gateway (src/picomesh/frontends/yhttp/frontend.c) are LEGACY, kept
    # only until the sidecar renders the full page set.
    #
    # gh#5: the gateway serves NO static files. Its legacy HTML inlines
    # the CSS it needs; the sidecar serves browser assets under /static.
    #
    # The `frontend:` key below is the TRANSPORT selector (yhttp |
    # yrpc | yttp), NOT a service name.
    gateway:
      port: 8090
      # 0.0.0.0 so the gateway is reachable from outside the host the
      # mesh runs on — required for the qemu hostfwd and the wasm/slirp
      # bridge inside the in-browser VM. Backends stay 127.0.0.1 (their
      # default) per the CLAUDE.md invariant: only the gateway is the
      # external auth boundary; everything else is mesh-internal.
      host: 0.0.0.0
      frontend: yhttp
      # gh#6: the gateway is the production hot path (the single auth
      # boundary every external request crosses) and was the measured
      # bottleneck — one process pegged at 100% of a single core. Set
      # `workers: N` to run it as N worker threads in ONE process: each
      # holds its own loop + coroutine scheduler and its own warm yrpc
      # connection set to every backend, all sharing this port via
      # SO_REUSEPORT. Omitted ⇒ 1. Requires libco built with -DLIBCO_MP.
      # Safe to scale now that every stateful backend (git_repo, issues,
      # git_pipeline, session, accounts, …) keeps its state in sharded_storage
      # rather than per-object memory — each gateway worker's own backend
      # objects all read/write the same shared source of truth.
      workers: 8
      plugins: []
      config:
        yhttp:
        # issue #19: this gateway is THE auth boundary. The authenticator
        # chain turns an accepted credential into a verified JWT (or
        # anonymous); the policy authorizer then gates endpoint + args before
        # any backend is invoked. Endpoints absent from `policy` are denied by
        # default (403). Only this service carries a `security` block, so only
        # this node is an auth boundary (the top-level `security.jwt_secret`
        # deep-merges in, supplying the shared signing key).
        #
        # `bearer_jwt_token` is intentionally OMITTED: the framework
        # implements it, but a PUBLIC gateway must never accept a raw client
        # JWT — external clients present opaque tokens (session cookie / PAT)
        # only, and the gateway resolves those to a verified JWT internally.
        security:
          authenticators:
            - session_cookie
            - bearer_opaque_token
          policy:
            # Service discovery is open (handled as a gateway route, listed
            # here for intent/forward-compat).
            _describe: anonymous
            _describe_tree: anonymous
            # Product reads/writes require a signed-in user; git_repo enforces
            # resource-level ownership on top of this gate.
            git_repo.git_repo.count_total: authenticated
            git_repo.git_repo.count_for_owner: authenticated
            git_repo.git_repo.list_for_owner: authenticated
            git_repo.git_repo.read_file: authenticated
            git_repo.git_repo.read_tree: authenticated
            git_repo.git_repo.make: authenticated
            git_repo.git_repo.put_file: authenticated
            issues.issues.open: authenticated
            issues.issues.close: authenticated
            issues.issues.count_open_in_repo: authenticated
            git_pipeline.git_pipeline.enqueue: authenticated
            git_pipeline.git_pipeline.enqueue_job: authenticated
            git_pipeline.git_pipeline.lease: authenticated
            git_pipeline.git_pipeline.count_pending: authenticated
            git_pipeline.git_pipeline.count_running: authenticated
            git_pipeline.git_pipeline.count_done: authenticated
            git_pipeline.git_pipeline.job_descriptor: authenticated
            git_pipeline.git_pipeline.read_log: authenticated
            # Runner-only job lifecycle: the caller must hold a runner token
            # (gateway mints groups "site:runner,runner:<id>" for an rnr_ token).
            git_pipeline.git_pipeline.lease_job:
              required_group: "site:runner"
            git_pipeline.git_pipeline.append_log:
              required_group: "site:runner"
            git_pipeline.git_pipeline.complete_job:
              required_group: "site:runner"
            git_pipeline.git_pipeline.requeue_expired:
              required_role: owner
              account_from: site
            # Runner registry: admins mint/revoke/list tokens; runners
            # register/heartbeat/get themselves with their runner token.
            runner_agent.runner_agent.create_token:
              required_role: owner
              account_from: site
            runner_agent.runner_agent.revoke_token:
              required_role: owner
              account_from: site
            runner_agent.runner_agent.list:
              required_role: owner
              account_from: site
            runner_agent.runner_agent.list_all:
              required_role: owner
              account_from: site
            runner_agent.runner_agent.count_active:
              required_role: owner
              account_from: site
            runner_agent.runner_agent.register:
              required_group: "site:runner"
            runner_agent.runner_agent.heartbeat:
              required_group: "site:runner"
            runner_agent.runner_agent.get:
              required_group: "site:runner"
            trace_collector.trace_collector.get_trace: authenticated
            trace_collector.trace_collector.services: authenticated
            trace_collector.trace_collector.operations: authenticated
            trace_collector.trace_collector.latency: authenticated
            trace_collector.trace_collector.errors: authenticated
            # Admin surfaces — site-owner only, expressed through the model
            # (replaces the gateway's old raw role:<uid> read).
            accounts.accounts.list:
              required_role: owner
              account_from: site
            accounts.accounts.count:
              required_role: owner
              account_from: site
            personal_access_tokens.personal_access_tokens.count_active:
              required_role: owner
              account_from: site
        # gh#14: per-node Linux perf_event_open(2) profiling, driven from
        # this service's own config — no separate `perf record` wrapper.
        # Flip `enabled: true` to have each gateway worker open the listed
        # counters against its own thread and log periodic deltas
        # (`perf[gateway wN] +<interval>ms: cycles=… instructions=…`). The
        # gateway is the production hot path, so it's the most useful target.
        # Scope is the worker's own loop thread; libgit2 / DB work offloaded
        # to the thread pool is not counted. Needs perf access on the host
        # (kernel.perf_event_paranoid / CAP_PERFMON); a refusal is logged
        # loudly and the service keeps serving. See docs/perf.md.
        perf:
          enabled: false
          mode: counters
          events:
            - cycles
            - instructions
            - cache-references
            - cache-misses
            - branch-misses
          interval_ms: 1000
          log: true
        remotes:
          - service: sharded_storage
            port: 8212
          - service: trace_collector
            port: 8220
          - service: session
            port: 8203
          - service: accounts
            port: 8204
          - service: password_authn
            port: 8205
          - service: github_authn
            port: 8206
          - service: token_issuer
            port: 8207
          - service: issues
            port: 8208
          - service: git_repo
            port: 8209
          - service: git_pipeline
            port: 8210
          - service: personal_access_tokens
            port: 8211
          - service: runner_agent
            port: 8214

    # ---- gh#15: generic service-console tooling ------------------------
    #
    # Two SEPARATE, app-agnostic nodes that know nothing about picoforge
    # accounts/repos/issues pages. They demonstrate the framework's
    # transport-bridge + service-console pieces; the picoforge browser UI
    # (picoforge-webapp) stays entirely separate from both.

    # yrpc->yhttp transport bridge: a plain yhttp node (NOT the gateway —
    # it deliberately does NOT front `session`, so it is not the auth
    # boundary) that exposes its configured remote yrpc backends through
    # the generic JSON service API and nothing else:
    #   GET|POST /_describe
    #   GET|POST /<service.class>/_describe
    #   POST     /_rpc {"path":"service.class.method","args":[],"kwargs":{}}
    # It serves NO /_alpine console and NO HTML pages. Backends stay yrpc.
    #
    # Ports stay in the 8xxx range on purpose: the perf harness derives its
    # mesh by a uniform 8xxx->9xxx shift and assumes the 9xxx space is
    # otherwise unused, so these must shift with everything else.
    internal_yhttp_bridge:
      port: 8230
      host: 127.0.0.1
      frontend: yhttp
      plugins: []
      config:
        # bridge_only: front EVERY backend (incl. session) for inspection,
        # without becoming the auth gateway. The console lists all services.
        yhttp:
          bridge_only: true
        remotes:
          - service: sharded_storage
            port: 8212
          - service: relational_storage
            port: 8213
          - service: trace_collector
            port: 8220
          - service: session
            port: 8203
          - service: accounts
            port: 8204
          - service: password_authn
            port: 8205
          - service: github_authn
            port: 8206
          - service: token_issuer
            port: 8207
          - service: issues
            port: 8208
          - service: git_repo
            port: 8209
          - service: git_pipeline
            port: 8210
          - service: personal_access_tokens
            port: 8211
          - service: runner_agent
            port: 8214
          - service: portalloc
            port: 8201

    # Generic /_alpine service console: its OWN frontend (`frontend:
    # alpine`), a separate Picomesh application/tool. It serves the static
    # console page and proxies the page's /_describe + JSON /_rpc calls to
    # the configured upstream yhttp endpoint (the bridge above). It builds
    # its whole UI from /_describe — no picoforge route knowledge. Open
    # http://127.0.0.1:8231/_alpine in a browser to inspect/invoke the
    # bridged services. Bind stays loopback; set `token` to gate access.
    service_console:
      port: 8231
      host: 127.0.0.1
      frontend: alpine
      plugins: []
      config:
        alpine:
          upstream:
            host: 127.0.0.1
            port: 8230
          # token: "change-me"   # optional: require ?token= / Bearer
