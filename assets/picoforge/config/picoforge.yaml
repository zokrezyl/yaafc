# picoforge — mirror of yaapp's scenarios/git-yaapp/yaapp.yaml.
#
# A "mesh" parent process spawns each backend as a child picomesh node.
# Only TWO nodes have a fixed address: the mesh control parent (control.port)
# and the `registry`. Every other node sets `port: auto` — at boot it
# allocates its listen port through `portalloc` (discovered via the registry),
# registers itself in the registry, and discovers each `port: auto` remote it
# consumes through the registry too. To run a SECOND instance on this host,
# override just `control.port` and `mesh.services.registry.port`; every other
# port is allocated dynamically and bind-probed, so nothing else collides.
# The public-facing gateway (8090) and loopback-only operator bridges
# (internal bridge 8230, service console 8231) keep fixed ports because
# clients address them directly. Core webapps such as picotrace are mesh
# managed and may use `port: auto`.
#
# To bring it up:
#
#   make build-desktop-release
#   ./tools/picoforge/mesh-up.sh
#
# The script connects to the parent's control yttp, calls
# `mesh_mesh_reconcile_from_config`, then probes a few children.

name: mesh

# Plugins the PARENT (control) process itself activates. Registration is
# activation: only listed plugins enter this process's registry and become
# reachable through its frontend. The parent only needs `mesh` — it serves
# mesh_mesh on the control port (/create + reconcile_from_config) to spawn
# the children. Each child is spawned with `--name <service>` and activates
# its own `mesh.services.<service>.plugins` list. (The driver reads this
# top-level `plugins:` because the parent runs with no `--name`.)
plugins:
  - mesh
  # The parent also activates `storage` for its OWN bookkeeping: mesh_mesh
  # records the pids of the children it spawns (and its own pid) here so it
  # can reap them on shutdown, and so the stack can be stopped by signalling
  # the recorded parent pid — never by pkill. Private parent state, separate
  # from the `sharded_storage` backend the app uses.
  - storage

storage:
  backend: sqlite
  db_path: /tmp/picoforge/mesh-state.db

# Mesh-wide security material (issue #19). The HS256 signing key for access
# JWTs is shared across the trusted mesh: the token issuer signs with it and
# the gateway verifies with it. It is REQUIRED — sourced from the environment,
# never a baked-in default (a predictable key would let anyone forge a JWT).
# Children inherit this env from the control parent, so every node resolves the
# same key. The authenticator chain + policy authorizer live ONLY on the
# gateway service (see mesh.services.gateway.config.security below); putting
# them here would turn every node into an auth boundary.
security:
  jwt_secret: "${PICOMESH_JWT_SECRET}"
  access_ttl_seconds: 900

# Parent process control port — clients (including the smoke script)
# talk to the mesh here.
control:
  host: 127.0.0.1
  port: 8800

mesh:
  auto_reconcile: true
  # Where the mesh writes the per-node config files it splits out of this
  # config (one <name>.yaml per service). REQUIRED — no baked-in path. A
  # second instance on this host points this (and its state paths) elsewhere;
  # override at launch with `--config mesh.nodes_dir=/tmp/picoforge2/nodes`.
  nodes_dir: /tmp/picoforge/nodes

  # Core webapps are generic operator applications started by the mesh parent,
  # not public Picoforge routes and not plugin nodes. They bind loopback by
  # default, get dynamic ports through portalloc, and receive resolved upstream
  # backend addresses from mesh reconciliation.
  webapps:
    picotrace:
      app: picotrace
      port: auto
      host: 127.0.0.1
      upstream:
        service: trace_collector

  services:

    # ---- tracing: sender-side batch knobs (apply to EVERY service) --------
    # Any service that emits spans batches them per worker and ships the batch
    # to the trace_collector as one yrpc array (an OTel BatchSpanProcessor).
    # Read by ytelemetry.c from each node's own `config.telemetry`; all optional
    # (defaults shown). Set them on a node's `config:` to override there:
    #
    #   telemetry:
    #     enabled: true            # per-service kill-switch                (default true)
    #     batch_max_spans: 128     # ship after this many spans             (default 128)
    #     batch_max_bytes: 3500    # ship before the array grows past this;
    #                              #   MUST stay under the ingest skel's 4096-
    #                              #   byte string-arg buffer or the whole
    #                              #   batch is rejected on receive  (default 3500)
    #     batch_flush_ms: 200      # ship a partial batch this old (a 50ms
    #                              #   worker timer also flushes idle ones)  (default 200)
    # ----------------------------------------------------------------------

    # registry — service discovery for the mesh. One of only TWO fixed-address
    # nodes (the other is the mesh control parent on `control.port`). The mesh
    # injects this host:port into every child's config as a global `registry:`
    # block, so a freshly spawned node can reach the registry — and through it
    # portalloc and its `port: auto` remotes — before it knows where anything
    # else lives. To run a SECOND instance on this host, override just this
    # port and `control.port`: every other node is `port: auto`, so nothing
    # else can collide. In-memory; the mesh re-spawns and every node
    # re-registers on boot. Spawned first by reconcile_from_config.
    registry:
      port: 8202
      plugins: [registry]
      config:
        remotes: []

    # The trace collector (issue #11): an ordinary yrpc backend plugin that
    # RECEIVES spans on its exposed `trace_collector_ingest` method and answers
    # query methods used by the internal picotrace core app and operators:
    # _traces / _get_trace / _services / _operations / _latency / _errors / _stats.
    # Every other service lists it as a remote
    # and ships finished spans to it over its OWN per-worker connection,
    # fire-and-forget (see ytelemetry). State is an in-memory bounded store —
    # no durable storage in v1. Reached for queries like any backend, through
    # the gateway's /_rpc + /_describe (service-driven, no bespoke routes).
    # Listed first so it binds before the services that emit to it.
    trace_collector:
      port: auto
      # Multi-worker like the gateway: N threads, each its own loop +
      # coroutine scheduler, all accept()ing on :8220 via SO_REUSEPORT and
      # multiplexing keep-alive connections. The receiver must drain ~5
      # spans per gateway request, so it needs real parallelism — a single
      # worker backpressures the request path (gh#13). The in-memory store is
      # sharded with per-worker lock-free arenas (gh#13 done), so it scales
      # with workers instead of serializing on a single lock.
      workers: 16
      plugins: [trace_collector]
      config:
        # In-memory store (read by the plugin → ytelemetry_store_init_config).
        # Every knob below is optional; omit one to take its built-in default.
        telemetry:
          # Sized for the production load: ~10k req/s x ~5 spans = ~50k spans/s.
          # Retention window = max_spans / span_rate, so 2,000,000 / 50,000 = ~40s
          # of traces viewable under constant load (~830 MB at ~416 B/span). The
          # per-trace index keeps list/detail queries O(recent), so a large
          # max_spans does NOT slow queries — raise it for a longer window.
          max_spans: 2000000       # total spans kept in RAM, across all shards
          max_age_seconds: 3600    # drop spans older than this (0 = no age cap)
          shards: 16               # parallel ingest partitions; match `workers`
          bucket_spans: 256        # per-shard arena batch before a flush
                                   #   higher = fewer locks/bigger batches, more RAM
                                   #   (per worker: shards * bucket_spans * ~416B)
          flush_ms: 50             # max staleness before a partial arena flush
        remotes: []

    # portalloc — bind-probing port allocator. Itself `port: auto`: it cannot
    # allocate through itself, so it self-allocates from a LOCAL instance at
    # boot, then registers in the registry like everyone else. The dynamic
    # range deliberately avoids every fixed port (control 8800, registry 8202,
    # gateway 8090, the two consoles 8230/8231), so a candidate is never one of
    # them. Several mesh instances can share this range — each candidate is
    # bind-probed, so two instances never hand out the same live port.
    portalloc:
      port: auto
      plugins: [portalloc]
      config:
        portalloc:
          port_range: "8300-8799"

    # Storage = write-parallel sharded KV store (N mdbx shard envs keyed
    # by hash(ns·key); one writer + fsync stream per shard). The plain
    # single-env `storage` plugin still exists in the tree but is no
    # longer run as a mesh service — every backend uses this.
    sharded_storage:
      port: auto
      # gh#6: in-process multithreaded workers. Set `workers: N` to run
      # this service as N worker threads in ONE process — each with its
      # own libuv event loop AND its own libco coroutine scheduler, all
      # accept()ing on the same port via SO_REUSEPORT. The RPC handle
      # table is per-worker (a connection is pinned to one worker for its
      # lifetime); the class registry is shared read-only. Omitted ⇒ 1
      # (single-threaded). Requires libco built with -DLIBCO_MP.
      # The shared source of truth for every backend's state — hit hardest,
      # so it gets the most workers.
      workers: 8
      plugins: [sharded_storage]
      config:
        sharded_storage:
          shards: 24
          path: /tmp/picoforge/sharded
        # sharded_storage calls no backend, but its skels emit server spans,
        # so it still needs a connection to ship them to the collector.
        remotes:
          - service: trace_collector
            port: auto

    # relational_storage (gh#18): SQLite per namespace-shard for relational
    # PRODUCT state (users, repos, members, issues, pipeline runs) — real SQL
    # constraints/indexes/joins/transactions, sharded by namespace_id % N.
    # The core product services use this; sharded_storage stays for KV-shaped
    # runtime state (sessions, tokens, caches). See docs/relational-storage.md.
    # Four relational clusters (docs/sharded-relational-storage.md): one
    # `relational_storage` instance per cluster. rstore_uid is the uid-sharded
    # DATA cluster (users + product tables); the other three are lookup clusters
    # sharded by hash(external id). Each is the same generic plugin, its own
    # shard files.
    rstore_uid:
      port: auto
      workers: 4
      plugins: [relational_storage]
      config:
        relational_storage:
          shards: 8
          path: /tmp/picoforge/rel/uid
          # The picoforge PRODUCT data model lives HERE, not in the engine.
          # relational_storage is generic: it applies this DDL verbatim to
          # each shard on open. Sharded by namespace (the caller's shard key).
          # NOTE: tables are owned and created by the PLUGIN that uses them
          # (each runs its own `CREATE TABLE IF NOT EXISTS` via
          # relational_storage on first use) — the consumer app does not define
          # another plugin's schema here. The blocks below are the not-yet-
          # migrated product plugins' tables (git_repo/issues/git_pipeline still
          # on KV); they move into those plugins when migrated. accounts,
          # session, and token_issuer own their tables in-plugin.
          schema: |
            CREATE TABLE IF NOT EXISTS repos(
              id INTEGER PRIMARY KEY,
              namespace_id INTEGER NOT NULL,
              namespace_path TEXT NOT NULL DEFAULT '',
              name TEXT NOT NULL,
              owner_uid INTEGER NOT NULL,
              visibility TEXT NOT NULL DEFAULT 'private',
              created_at INTEGER NOT NULL DEFAULT 0,
              UNIQUE(namespace_path, name));
            CREATE TABLE IF NOT EXISTS repo_members(
              repo_id INTEGER NOT NULL,
              uid INTEGER NOT NULL,
              role TEXT NOT NULL DEFAULT 'member',
              PRIMARY KEY(repo_id, uid));
            CREATE TABLE IF NOT EXISTS issues(
              id INTEGER PRIMARY KEY,
              repo_id INTEGER NOT NULL,
              number INTEGER NOT NULL,
              title TEXT,
              status TEXT NOT NULL DEFAULT 'open',
              author_uid INTEGER NOT NULL,
              created_at INTEGER NOT NULL DEFAULT 0,
              UNIQUE(repo_id, number));
            CREATE TABLE IF NOT EXISTS pipeline_runs(
              id INTEGER PRIMARY KEY,
              repo_id INTEGER NOT NULL,
              runner_id INTEGER NOT NULL DEFAULT 0,
              status INTEGER NOT NULL DEFAULT 0,
              ref TEXT NOT NULL DEFAULT '',
              pipeline_path TEXT NOT NULL DEFAULT '',
              attempt INTEGER NOT NULL DEFAULT 1,
              timeout INTEGER NOT NULL DEFAULT 300,
              lease_expiry INTEGER NOT NULL DEFAULT 0,
              log TEXT NOT NULL DEFAULT '',
              summary TEXT NOT NULL DEFAULT '',
              created_by_uid INTEGER NOT NULL DEFAULT 0,
              created_at INTEGER NOT NULL DEFAULT 0);
            CREATE INDEX IF NOT EXISTS ix_runs_status ON pipeline_runs(status);
            CREATE INDEX IF NOT EXISTS ix_repos_owner ON repos(owner_uid);
            CREATE INDEX IF NOT EXISTS ix_issues_repo ON issues(repo_id);
            CREATE INDEX IF NOT EXISTS ix_runs_repo   ON pipeline_runs(repo_id);
            CREATE INDEX IF NOT EXISTS ix_members_uid ON repo_members(uid);
        remotes:
          - service: trace_collector
            port: auto

    # Lookup clusters: map an external id → uid, sharded by hash(id). Tables are
    # plugin-owned (accounts/session/token_issuer create them via DDL broadcast).
    rstore_username:
      port: auto
      workers: 4
      plugins: [relational_storage]
      config:
        relational_storage:
          shards: 8
          path: /tmp/picoforge/rel/username
        remotes:
          - service: trace_collector
            port: auto
    rstore_session:
      port: auto
      workers: 4
      plugins: [relational_storage]
      config:
        relational_storage:
          shards: 8
          path: /tmp/picoforge/rel/session
        remotes:
          - service: trace_collector
            port: auto
    rstore_token:
      port: auto
      workers: 4
      plugins: [relational_storage]
      config:
        relational_storage:
          shards: 8
          path: /tmp/picoforge/rel/token
        remotes:
          - service: trace_collector
            port: auto

    session:
      port: auto
      # Hit on EVERY authenticated /_rpc (token→uid). State is in
      # sharded_storage (no in-memory bookkeeping); start mints a random
      # 128-bit token (no shared counter) and lookup is a single read, so
      # there is no read-modify-write to race across workers.
      workers: 8
      plugins: [session]
      config:
        remotes:
          - service: sharded_storage
            port: auto
          # session rows live in the rstore_session lookup cluster, sharded by
          # hash(session_id); the session plugin owns the table.
          - service: rstore_session
            port: auto
          - service: trace_collector
            port: auto
          - service: token_issuer
            port: auto

    accounts:
      port: auto
      workers: 8   # was single-worker → register/account writes serialized
      plugins: [accounts]
      config:
        accounts:
          # GitLab-style top-level group creation. When true (the default), any
          # authenticated user may create a ROOT namespace (group). Set false to
          # restrict root-group creation to site admins (the trusted internal
          # bootstrap that creates a user's personal namespace, and the reserved
          # `site` namespace, are unaffected — they always work). Mirrors
          # GitLab's "Users can create top-level groups" setting.
          allow_user_root_groups: true
          # Pluggable external-directory group resolution (issue #31). When
          # `enabled`, accounts.groups(uid) merges the local namespace_members
          # grants with roles mapped from an external directory's groups, with
          # the highest role winning per namespace. Disabled here → local-only
          # behavior (the default).
          #
          # `provider` selects the directory backend behind the groups() facade:
          #   config  (default) — membership comes from the `members` map below
          #                       (keyed by username, uid fallback). Dev/test.
          #   ldap              — LDAP/AD-style adapter. A real deployment binds
          #                       to the directory and group-searches the user;
          #                       in dev/test it reads `mock_members` (same shape
          #                       as `members`) so the mapping/merge path is
          #                       exercised without a live directory. With no
          #                       reachable directory it FAILS CLOSED (a provider
          #                       error denies groups() when fail_closed is set),
          #                       so a directory outage never silently drops a
          #                       privileged mapping.
          # A new backend implements ONE resolver function in accounts.c; nothing
          # downstream (token_issuer/git_repo/webapp) changes.
          external_groups:
            enabled: false
            fail_closed: true
            provider: config
            # members:                       # provider: config
            #   alice: [acme-platform-devs, picoforge-admins]
            # mock_members:                  # provider: ldap (dev/test mock)
            #   alice: [acme-platform-devs]
            # mappings:                      # external group -> namespace:role
            #   - { external_group: acme-platform-devs, namespace: acme/platform, role: developer }
            #   - { external_group: picoforge-admins,   namespace: site,          role: maintainer }
        remotes:
          - service: sharded_storage
            port: auto
          # accounts: users in rstore_uid (sharded by uid); the username→uid
          # uniqueness lookup in rstore_username (sharded by hash(username)).
          - service: rstore_uid
            port: auto
          - service: rstore_username
            port: auto
          - service: trace_collector
            port: auto

    password_authn:
      port: auto
      plugins: [password_authn]
      config:
        remotes:
          - service: sharded_storage
            port: auto
          - service: trace_collector
            port: auto
          - service: accounts
            port: auto

    github_authn:
      port: auto
      plugins: [github_authn]
      config:
        github_authn:
          # Woodpecker-style GitHub OAuth App credentials. Register an OAuth App
          # with callback <webapp-public-url>/-/auth/github/callback and export:
          #   PICOFORGE_GITHUB_CLIENT=<client id>
          #   PICOFORGE_GITHUB_SECRET=<client secret>
          client_id: "${PICOFORGE_GITHUB_CLIENT:}"
          client_secret: "${PICOFORGE_GITHUB_SECRET:}"
          oauth_url: "${PICOFORGE_GITHUB_OAUTH_URL:https://github.com/login/oauth/access_token}"
          api_url: "${PICOFORGE_GITHUB_API_URL:https://api.github.com}"
        remotes:
          - service: sharded_storage
            port: auto
          - service: trace_collector
            port: auto
          # exchange_code checks accounts.exists to refuse binding a GitHub
          # identity onto a pre-existing non-GitHub account (issue: OAuth
          # existing-account binding).
          - service: accounts
            port: auto

    token_issuer:
      port: auto
      plugins: [token_issuer]
      config:
        remotes:
          - service: sharded_storage
            port: auto
          # refresh_tokens live in rstore_token, sharded by hash(token).
          - service: rstore_token
            port: auto
          - service: trace_collector
            port: auto
          - service: accounts
            port: auto
          # login delegates credential verification to password_authn.
          - service: password_authn
            port: auto

    issues:
      port: auto
      workers: 8   # was single-worker → open_issue (4 serial commits) bottleneck
      plugins: [issues]
      config:
        remotes:
          # issues are RELATIONAL ROWS in the rstore_uid cluster's `issues`
          # table (issue #18) — no longer KV in sharded_storage.
          - service: rstore_uid
            port: auto
          - service: trace_collector
            port: auto
          # open/close resolve repo -> namespace to gate by namespace role.
          - service: git_repo
            port: auto

    git_repo:
      port: auto
      # Repo METADATA lives in the relational `repos` table (rstore_uid),
      # sharded by repo_id (issue #18): SQL enforces namespace+name uniqueness,
      # and owner/namespace listings + counts are plain queries (no hand-kept KV
      # indexes to drift). The bare repos on disk remain the content source of
      # truth (libgit2). Creation elects one writer via INSERT OR IGNORE on the
      # repo_id primary key.
      #
      # CPU-bound: a put_file commit is libgit2 work — zlib deflate/inflate
      # (~27%) + SHA1DC (~15%) + tree rebuild; disk write/fsync is ~0.1%, so it
      # is NOT disk-bound and storage shards do nothing for it. That work runs on
      # the libuv worker POOL (sized workers*4), and parallelises per bare repo —
      # so `workers` is git_repo's commit-parallelism knob. The isolated put_file
      # test is pool-thread-bound (16 threads at workers:4 → ~8k commits/s while
      # using only ~13 cores), so raise it: workers:8 gives a 32-thread pool to
      # push more concurrent commits across the cores. git_repo is the heaviest
      # tier, so it gets the most parallelism. (Remaining wins are build-level:
      # zlib-ng — done — and hardware SHA-NI instead of bundled SHA1DC.)
      workers: 8
      plugins: [git_repo]
      config:
        git_repo:
          # Per-user parent dir layout: each repo lives at
          # <repos_dir>/<owner_name>/<repo_name>.git (bare).
          # Defaults to /tmp/picoforge/repos if omitted.
          repos_dir: /tmp/picoforge/repos
        remotes:
          - service: trace_collector
            port: auto
          # Repo metadata rows live in the uid-sharded relational DATA cluster
          # (issue #18) — the `repos` table, sharded by repo_id.
          - service: rstore_uid
            port: auto
          # make() verifies the owning namespace exists and records its
          # namespace_id by calling accounts.ns_resolve (issue #30).
          - service: accounts
            port: auto

    git_pipeline:
      port: auto
      workers: 8   # was single-worker → enqueue serialized
      plugins: [git_pipeline]
      config:
        remotes:
          # pipeline jobs are RELATIONAL ROWS in rstore_uid's pipeline_runs
          # table (issue #18) — FIFO lease, counts and transitions are SQL, no
          # longer hand-kept KV counters/CAS in sharded_storage.
          - service: rstore_uid
            port: auto
          - service: trace_collector
            port: auto
          # read_log/job_descriptor resolve the job's repo -> namespace to gate
          # reads by namespace role (runner-owner OR reporter+), issue #30.
          - service: git_repo
            port: auto

    personal_access_tokens:
      port: auto
      plugins: [personal_access_tokens]
      config:
        remotes:
          - service: sharded_storage
            port: auto
          - service: trace_collector
            port: auto

    # runner_agent (docs/runner-agent.md): the registry of external CI runner
    # agents. Owns runner identity — opaque `rnr_` token mint/lookup/revoke and
    # the runner record (name, labels, version, host, status, last_seen). The
    # gateway's bearer authenticator resolves an `rnr_` token here to a runner
    # id and mints a runner JWT; git_pipeline owns the job state the runner then
    # leases. yrpc backend like the rest — no HTTP, behind the gateway.
    runner_agent:
      port: auto
      plugins: [runner_agent]
      config:
        remotes:
          - service: sharded_storage
            port: auto
          - service: trace_collector
            port: auto
          # runner_agent.exchange mints the runner JWT via the token issuer.
          - service: token_issuer
            port: auto

    # The gateway. Per CLAUDE.md: this is the ONE service that
    # listens yhttp — it's the auth boundary. External clients
    # (browser sidecar, MCP, CLI, tests) hit it; the gateway
    # translates opaque tokens to internal JWTs and forwards over
    # yrpc.
    #
    # Public API (yaapp-compatible, src/picomesh/frontends/yhttp/):
    #   POST /_rpc                {"path":"service.class.method","args":[]}
    #   GET|POST /_describe                       — list backend services
    #   GET|POST /<service.class>/_describe[_tree] — list a class's methods
    # The legacy /create, /invoke and /describe?class= helpers are
    # retired on this port (they answer 410 → use /_rpc). The binary
    # /_rpc?op=&id= form remains internal gateway↔backend transport.
    #
    # FRONTEND DIRECTION (resolved): the browser-facing HTML is the
    # standalone `picoforge-webapp` sidecar (src/picoforge/webapp/), NOT a
    # combined gateway. The sidecar links no plugins and reaches every
    # backend only through this gateway's /_rpc — see mesh-up.sh, which
    # launches it on :8080. Internal operator apps such as picotrace live
    # under src/picomesh/core-apps and are not exposed by this sidecar.
    # The HTML routes still compiled into the
    # gateway (src/picomesh/frontends/yhttp/frontend.c) are LEGACY, kept
    # only until the sidecar renders the full page set.
    #
    # gh#5: the gateway serves NO static files. Its legacy HTML inlines
    # the CSS it needs; the sidecar serves browser assets under /static.
    #
    # The `frontend:` key below is the TRANSPORT selector (yhttp |
    # yrpc | yttp), NOT a service name.
    gateway:
      port: 8090
      # 0.0.0.0 so the gateway is reachable from outside the host the
      # mesh runs on — required for the qemu hostfwd and the wasm/slirp
      # bridge inside the in-browser VM. Backends stay 127.0.0.1 (their
      # default) per the CLAUDE.md invariant: only the gateway is the
      # external auth boundary; everything else is mesh-internal.
      host: 0.0.0.0
      frontend: yhttp
      # gh#6: the gateway is the production hot path (the single auth
      # boundary every external request crosses) and was the measured
      # bottleneck — one process pegged at 100% of a single core. Set
      # `workers: N` to run it as N worker threads in ONE process: each
      # holds its own loop + coroutine scheduler and its own warm yrpc
      # connection set to every backend, all sharing this port via
      # SO_REUSEPORT. Omitted ⇒ 1. Requires libco built with -DLIBCO_MP.
      # Safe to scale now that every stateful backend (git_repo, issues,
      # git_pipeline, session, accounts, …) keeps its state in sharded_storage
      # rather than per-object memory — each gateway worker's own backend
      # objects all read/write the same shared source of truth.
      workers: 8
      plugins: []
      config:
        yhttp:
        # issue #19: this gateway is THE auth boundary. The authenticator
        # chain turns an accepted credential into a verified JWT (or
        # anonymous); the policy authorizer then gates endpoint + args before
        # any backend is invoked. Endpoints absent from `policy` are denied by
        # default (403). Only this service carries a `security` block, so only
        # this node is an auth boundary (the top-level `security.jwt_secret`
        # deep-merges in, supplying the shared signing key).
        #
        # `bearer_jwt_token` is intentionally OMITTED: the framework
        # implements it, but a PUBLIC gateway must never accept a raw client
        # JWT — external clients present opaque tokens (session cookie / PAT)
        # only, and the gateway resolves those to a verified JWT internally.
        security:
          authenticators:
            # browser → webapp → gateway: opaque sid cookie (or forwarded
            # same-named header) exchanged for the stored access JWT.
            - type: session_cookie
              cookie: picomesh-sid
              header: picomesh-sid
              lookup: session.session.jwt
            # API clients holding a real access JWT. Tokens with an opaque
            # prefix belong to the opaque schemes below, so skip them here.
            - type: bearer_jwt_token
              reject_prefixes: ["pat_", "rnr_"]
            # Opaque bearer schemes — one entry PER prefix, each with its
            # own lookup service. The authenticator does NOT know PAT/runner
            # internals: it hands the whole token to `lookup`, which returns
            # a JWT. (Making these lookups return a JWT is the PAT/runner
            # follow-up; the framework + config shape are generic now.)
            # NOTE: a `pat_` opaque entry is intentionally NOT enabled yet. The
            # personal_access_tokens plugin is still an in-memory numeric POC:
            # its `lookup` returns a uid (not a JWT) and `mint` does not even
            # hand a usable token back. Enabling a `pat_` entry would advertise
            # a flow that cannot work. When PATs become real random opaque
            # tokens (hash-at-rest), add a `personal_access_tokens.exchange`
            # that returns a JWT — exactly like runner_agent.exchange below —
            # and add the entry here. (issue #27 / docs/security.md follow-up)
            - type: bearer_opaque_token
              prefix: "rnr_"
              lookup: runner_agent.runner_agent.exchange
          authorizer:
            type: policy
            policy:
              # Service discovery is open (handled as a gateway route, listed
              # here for intent/forward-compat).
              _describe: anonymous
              _describe_tree: anonymous
              # Namespace RBAC (issue #30 / docs/security.md). Each repo op
              # resolves the repo's owning namespace and compares the caller's
              # INHERITED namespace role (resource_from + role_scope). site_bypass
              # lets a site:maintainer+ admin manage any repo, opt-in per rule.
              git_repo.git_repo.count_total: authenticated
              git_repo.git_repo.count_for_owner: authenticated
              git_repo.git_repo.list_for_owner: authenticated
              # Namespace-based repo discovery: reporter+ on the namespace (the
              # service re-checks). This is how a namespace page lists its repos,
              # group repos included.
              git_repo.git_repo.list_for_namespace:
                required_role: reporter
                resource_from: "{kwargs.path}"
                role_scope: namespace_path
                site_bypass: true
              git_repo.git_repo.count_for_namespace:
                required_role: reporter
                resource_from: "{kwargs.path}"
                role_scope: namespace_path
                site_bypass: true
              # Reads need reporter+ on the repo namespace; a PUBLIC repo is
              # readable by anyone (allow_public), including anonymous callers.
              git_repo.git_repo.read_tree:
                required_role: reporter
                resource_from: "{kwargs.repo_id}"
                role_scope: repo_namespace
                allow_public: true
                site_bypass: true
              git_repo.git_repo.read_file:
                required_role: reporter
                resource_from: "{kwargs.repo_id}"
                role_scope: repo_namespace
                allow_public: true
                site_bypass: true
              # Creating a repo needs developer+ on the TARGET namespace path.
              git_repo.git_repo.make:
                required_role: developer
                resource_from: "{kwargs.owner_name}"
                role_scope: namespace_path
                site_bypass: true
              # Pushing content needs developer+ on the repo's owning namespace.
              git_repo.git_repo.put_file:
                required_role: developer
                resource_from: "{kwargs.repo_id}"
                role_scope: repo_namespace
                site_bypass: true
              # Changing visibility needs maintainer+ on the repo's namespace.
              git_repo.git_repo.set_public:
                required_role: maintainer
                resource_from: "{kwargs.repo_id}"
                role_scope: repo_namespace
                site_bypass: true
              # Deleting a repo needs maintainer+ on the repo's namespace (the
              # service re-checks this too).
              git_repo.git_repo.delete:
                required_role: maintainer
                resource_from: "{kwargs.repo_id}"
                role_scope: repo_namespace
                site_bypass: true
              # Issues + pipelines are scoped to the repo's namespace (issue #30).
              # Filing/closing an issue + reading issue counts needs reporter+;
              # triggering a pipeline needs developer+ — resolved to the repo's
              # namespace. open/count/enqueue take a repo_id directly; close takes
              # an issue_id, resolved issue_id -> repo_id -> namespace.
              issues.issues.open:
                required_role: reporter
                resource_from: "{kwargs.repo_id}"
                role_scope: repo_namespace
                site_bypass: true
              issues.issues.close:
                required_role: reporter
                resource_from: "{kwargs.issue_id}"
                role_scope: issue_namespace
                site_bypass: true
              issues.issues.count_open_in_repo:
                required_role: reporter
                resource_from: "{kwargs.repo_id}"
                role_scope: repo_namespace
                site_bypass: true
              git_pipeline.git_pipeline.enqueue:
                required_role: developer
                resource_from: "{kwargs.repo_id}"
                role_scope: repo_namespace
                site_bypass: true
              git_pipeline.git_pipeline.enqueue_job:
                required_role: developer
                resource_from: "{kwargs.repo_id}"
                role_scope: repo_namespace
                site_bypass: true
              # Legacy lease is a runner op like lease_job — runner-token only
              # (git_pipeline also re-checks the caller owns the runner id).
              git_pipeline.git_pipeline.lease:
                required_group: "site:runner"
              git_pipeline.git_pipeline.count_pending: authenticated
              git_pipeline.git_pipeline.count_running: authenticated
              git_pipeline.git_pipeline.count_done: authenticated
              # job_descriptor/read_log take a job_id and are read by BOTH the
              # leasing runner (no repo role) and repo members, so the
              # "runner-owner OR reporter+ on the repo namespace" decision can't be
              # expressed as a single policy rule — it is enforced service-local in
              # git_pipeline (gp_job_readable). The gate here is just authenticated.
              git_pipeline.git_pipeline.job_descriptor: authenticated
              git_pipeline.git_pipeline.read_log: authenticated
              # Runner-only job lifecycle: the caller must hold a runner token
              # (gateway mints groups "site:runner,runner:<id>" for an rnr_ token).
              git_pipeline.git_pipeline.lease_job:
                required_group: "site:runner"
              git_pipeline.git_pipeline.append_log:
                required_group: "site:runner"
              git_pipeline.git_pipeline.complete_job:
                required_group: "site:runner"
              git_pipeline.git_pipeline.requeue_expired:
                required_role: owner
                account_from: site
              # Runner registry: admins mint/revoke/list tokens; runners
              # register/heartbeat/get themselves with their runner token.
              runner_agent.runner_agent.create_token:
                required_role: owner
                account_from: site
              runner_agent.runner_agent.revoke_token:
                required_role: owner
                account_from: site
              runner_agent.runner_agent.list:
                required_role: owner
                account_from: site
              runner_agent.runner_agent.list_all:
                required_role: owner
                account_from: site
              runner_agent.runner_agent.count_active:
                required_role: owner
                account_from: site
              runner_agent.runner_agent.register:
                required_group: "site:runner"
              runner_agent.runner_agent.heartbeat:
                required_group: "site:runner"
              runner_agent.runner_agent.get:
                required_group: "site:runner"
              trace_collector.trace_collector.get_trace: authenticated
              trace_collector.trace_collector.traces: authenticated
              trace_collector.trace_collector.services: authenticated
              trace_collector.trace_collector.operations: authenticated
              trace_collector.trace_collector.latency: authenticated
              trace_collector.trace_collector.errors: authenticated
              trace_collector.trace_collector.stats: authenticated
              # Namespace authority (issue #30). The gate is `authenticated`, but
              # the SERVICE enforces the real rules: creating a ROOT namespace is
              # a site-admin (or internal-bootstrap) operation, and creating a
              # SUBGROUP needs maintainer+ on the parent. Managing members needs
              # maintainer+ on the namespace (inherited) — owner/site-admin yes,
              # outsider no. (Policy stays `authenticated` because the per-case
              # authority depends on the parent path, which the service resolves.)
              accounts.accounts.ns_create: authenticated
              # Resolve a username to its assigned uid (issue #29). Low
              # sensitivity (a uid is an opaque integer); any authenticated user
              # may resolve it — the webapp uses it to turn a typed username into
              # the uid passed to ns_add_member (which is itself maintainer-gated).
              accounts.accounts.uid_for_username: authenticated
              accounts.accounts.ns_add_member:
                required_role: maintainer
                resource_from: "{kwargs.path}"
                role_scope: namespace_path
                site_bypass: true
              accounts.accounts.ns_remove_member:
                required_role: maintainer
                resource_from: "{kwargs.path}"
                role_scope: namespace_path
                site_bypass: true
              # Enumerating the WHOLE namespace tree is a site-admin view (the
              # admin RBAC page). A single namespace's members can be viewed by a
              # maintainer of that namespace (the group-management area) or a site
              # admin.
              accounts.accounts.ns_list:
                required_role: owner
                account_from: site
              accounts.accounts.ns_members:
                required_role: maintainer
                resource_from: "{kwargs.path}"
                role_scope: namespace_path
                site_bypass: true
              # The namespace subtree (a namespace + its descendants) drives the
              # webapp Projects page's role-based repo discovery: a reporter+ on
              # the namespace inherits into the whole subtree, so reporter is the
              # gate (mirrors the read gate on the repos themselves).
              accounts.accounts.ns_subtree:
                required_role: reporter
                resource_from: "{kwargs.path}"
                role_scope: namespace_path
                site_bypass: true
              # ns_delete is NOT exposed here: it is an internal-only operation
              # (the first-user `site` bootstrap rollback calls it over a direct
              # service connection with the system capability). Absence from the
              # gateway policy means an external /_rpc caller is denied — the
              # namespace tree cannot be pruned from outside the mesh.
              # Admin surfaces — site-owner only, expressed through the model
              # (replaces the gateway's old raw role:<uid> read).
              accounts.accounts.list:
                required_role: owner
                account_from: site
              accounts.accounts.count:
                required_role: owner
                account_from: site
              personal_access_tokens.personal_access_tokens.count_active:
                required_role: owner
                account_from: site
        # gh#14: per-node Linux perf_event_open(2) profiling, driven from
        # this service's own config — no separate `perf record` wrapper.
        # Flip `enabled: true` to have each gateway worker open the listed
        # counters against its own thread and log periodic deltas
        # (`perf[gateway wN] +<interval>ms: cycles=… instructions=…`). The
        # gateway is the production hot path, so it's the most useful target.
        # Scope is the worker's own loop thread; libgit2 / DB work offloaded
        # to the thread pool is not counted. Needs perf access on the host
        # (kernel.perf_event_paranoid / CAP_PERFMON); a refusal is logged
        # loudly and the service keeps serving. See docs/perf.md.
        perf:
          enabled: false
          mode: counters
          events:
            - cycles
            - instructions
            - cache-references
            - cache-misses
            - branch-misses
          interval_ms: 1000
          log: true
        remotes:
          - service: sharded_storage
            port: auto
          - service: trace_collector
            port: auto
          - service: session
            port: auto
          - service: accounts
            port: auto
          - service: password_authn
            port: auto
          - service: github_authn
            port: auto
          - service: token_issuer
            port: auto
          - service: issues
            port: auto
          - service: git_repo
            port: auto
          - service: git_pipeline
            port: auto
          - service: personal_access_tokens
            port: auto
          - service: runner_agent
            port: auto

    # ---- gh#15: generic service-console tooling ------------------------
    #
    # Two SEPARATE, app-agnostic nodes that know nothing about picoforge
    # accounts/repos/issues pages. They demonstrate the framework's
    # transport-bridge + service-console pieces; the picoforge browser UI
    # (picoforge-webapp) stays entirely separate from both.

    # yrpc->yhttp transport bridge: a plain yhttp node (NOT the gateway —
    # it deliberately does NOT front `session`, so it is not the auth
    # boundary) that exposes its configured remote yrpc backends through
    # the generic JSON service API and nothing else:
    #   GET|POST /_describe
    #   GET|POST /<service.class>/_describe
    #   POST     /_rpc {"path":"service.class.method","args":[],"kwargs":{}}
    # It serves NO /_alpine console and NO HTML pages. Backends stay yrpc.
    #
    # Ports stay in the 8xxx range on purpose: the perf harness derives its
    # mesh by a uniform 8xxx->9xxx shift and assumes the 9xxx space is
    # otherwise unused, so these must shift with everything else.
    internal_yhttp_bridge:
      port: 8230
      host: 127.0.0.1
      frontend: yhttp
      plugins: []
      config:
        # bridge_only: front EVERY backend (incl. session) for inspection,
        # without becoming the auth gateway. The console lists all services.
        yhttp:
          bridge_only: true
        remotes:
          - service: sharded_storage
            port: auto
          - service: rstore_uid
            port: auto
          - service: rstore_username
            port: auto
          - service: rstore_session
            port: auto
          - service: rstore_token
            port: auto
          - service: trace_collector
            port: auto
          - service: session
            port: auto
          - service: accounts
            port: auto
          - service: password_authn
            port: auto
          - service: github_authn
            port: auto
          - service: token_issuer
            port: auto
          - service: issues
            port: auto
          - service: git_repo
            port: auto
          - service: git_pipeline
            port: auto
          - service: personal_access_tokens
            port: auto
          - service: runner_agent
            port: auto
          - service: portalloc
            port: auto

    # Generic /_alpine service console: its OWN frontend (`frontend:
    # alpine`), a separate Picomesh application/tool. It serves the static
    # console page and proxies the page's /_describe + JSON /_rpc calls to
    # the configured upstream yhttp endpoint (the bridge above). It builds
    # its whole UI from /_describe — no picoforge route knowledge. Open
    # http://127.0.0.1:8231/_alpine in a browser to inspect/invoke the
    # bridged services. Bind stays loopback; set `token` to gate access.
    service_console:
      port: 8231
      host: 127.0.0.1
      frontend: alpine
      plugins: []
      config:
        alpine:
          upstream:
            host: 127.0.0.1
            port: 8230
          # token: "change-me"   # optional: require ?token= / Bearer
