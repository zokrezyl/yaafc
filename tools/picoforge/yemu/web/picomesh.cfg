/* picomesh-yemu VM config — consumed by tinyemu's temu.c.
 *
 * Paths are MEMFS paths inside the wasm runtime; the JS preamble
 * (index.html) writes the kernel + opensbi + rootfs into these
 * locations before calling main().
 *
 * net=user is slirp's user-mode network (NAT'd inside the VM with
 * the standard 10.0.2.0/24 layout). The forwarded ports inside the
 * VM (8080 = picomesh gateway, 8081 = picoforge-webapp) are reachable from
 * the host via slirp's redirector when running outside the browser;
 * inside the browser the network is contained to the wasm process.
 */
{
    version: 1,
    machine: "riscv64",
    /* 1 GiB guest RAM. The emcc module links -sALLOW_MEMORY_GROWTH=1
     * (default 2 GB cap), so the wasm linear memory grows to hold this
     * plus the rootfs image. The headroom is what makes a sizeable
     * tmpfs for the git repo tree (mounted in run.sh) usable without
     * starving the guest kernel + picomesh processes. */
    memory_size: 1024,
    bios: "/vm/opensbi-fw_jump.elf",
    kernel: "/vm/kernel-riscv64.bin",
    /* `quiet loglevel=3` suppresses the verbose kernel printk boot spam — each
     * line otherwise crosses the wasm→JS→postMessage→DOM bridge, which is a
     * dominant browser-boot cost. Userspace (mesh) logs on /dev/console are
     * unaffected. */
    cmdline: "earlycon=sbi console=hvc0 root=/dev/vda rootfstype=ext4 rw quiet loglevel=3 init=/opt/picoforge/init",
    drive0: { file: "/vm/alpine-rootfs.img" },
    eth0: { driver: "user" },
}
